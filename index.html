<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Theme Dashboard</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f7fa; color: #1a1a2e; padding: 32px 24px; }
  h1 { font-size: 1.4rem; font-weight: 600; margin-bottom: 4px; }
  .subtitle { font-size: 0.85rem; color: #888; margin-bottom: 24px; }
  .status { font-size: 0.78rem; color: #aaa; margin-bottom: 20px; }
  .status span { font-weight: 500; color: #555; }
  table { width: 100%; border-collapse: collapse; background: #fff; border-radius: 10px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,0.08); }
  thead { background: #1a1a2e; color: #fff; }
  th { padding: 14px 20px; text-align: left; font-size: 0.8rem; text-transform: uppercase; letter-spacing: 0.06em; }
  td { padding: 13px 20px; font-size: 0.92rem; border-bottom: 1px solid #f0f0f0; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: #f9f9ff; }
  .count-cell { font-weight: 600; color: #4f46e5; }
  .bar-wrap { display: flex; align-items: center; gap: 10px; }
  .bar { height: 8px; background: #e0e7ff; border-radius: 4px; flex: 1; }
  .bar-fill { height: 100%; background: #4f46e5; border-radius: 4px; transition: width 0.4s ease; }
  .error { color: #e53e3e; padding: 16px; background: #fff5f5; border-radius: 8px; font-size: 0.9rem; }
  .loading { color: #888; font-size: 0.9rem; padding: 20px 0; }
  .refresh-btn { margin-left: 12px; font-size: 0.78rem; background: #eef2ff; color: #4f46e5; border: none; border-radius: 6px; padding: 4px 10px; cursor: pointer; }
  .refresh-btn:hover { background: #e0e7ff; }
</style>
</head>
<body>

<h1>Theme Dashboard</h1>
<p class="subtitle">Social listening data — auto-refreshes every 60 seconds</p>
<p class="status">Last updated: <span id="last-updated">—</span> <button class="refresh-btn" onclick="loadData()">↻ Refresh</button></p>

<div id="container"><p class="loading">Loading data...</p></div>

<script>
  const SHEET_ID = "1T2WZMP7UyK_MLC5_iGMXHlkv1VwzLLz5g1KucACwq1c";
  const URL = `https://docs.google.com/spreadsheets/d/${SHEET_ID}/gviz/tq?tqx=out:json`;

  async function loadData() {
    try {
      const res = await fetch(URL);
      const text = await res.text();
      const json = JSON.parse(text.match(/google\.visualization\.Query\.setResponse\(([\s\S\w]+)\)/)[1]);
      const rows = json.table.rows.map(r => ({
        theme: r.c[0]?.v ?? "",
        count: Number(r.c[1]?.v ?? 0)
      }));

      if (!rows || rows.length === 0) {
        document.getElementById("container").innerHTML = "<p class='error'>No data found in sheet.</p>";
        return;
      }

      const parsed = rows
        .filter(r => r.theme !== "")
        .sort((a, b) => b.count - a.count);

      const max = Math.max(...parsed.map(r => r.count));

      const tbody = parsed.map(r => `
        <tr>
          <td>${r.theme}</td>
          <td class="count-cell">${r.count.toLocaleString()}</td>
          <td>
            <div class="bar-wrap">
              <div class="bar"><div class="bar-fill" style="width:${max > 0 ? (r.count/max*100).toFixed(1) : 0}%"></div></div>
            </div>
          </td>
        </tr>`).join("");

      document.getElementById("container").innerHTML = `
        <table>
          <thead><tr><th>Theme</th><th>Count</th><th>Distribution</th></tr></thead>
          <tbody>${tbody}</tbody>
        </table>`;

      document.getElementById("last-updated").textContent = new Date().toLocaleTimeString();
    } catch (e) {
      document.getElementById("container").innerHTML = `<p class='error'>Error loading data: ${e.message}</p>`;
    }
  }

  loadData();
  setInterval(loadData, 60000);
</script>
</body>
</html>
